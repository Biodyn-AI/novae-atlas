<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Disable HTML caching so a fresh deploy is always picked up immediately.
         The hashed JS/CSS assets are still cached aggressively by the CDN; this
         only forces a fresh index.html on each visit so the latest bundle hash
         is loaded. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Novae SAE Atlas — novae-human-0</title>
    <meta name="description" content="Sparse autoencoder atlas of the Novae spatial-omics foundation model. Per-feature gene markers, cell-type enrichment, and Novae niche assignments across 4.5M cells, 15 tissues, 5 technologies." />
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
